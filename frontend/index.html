<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Mini Akinator</title>
<link href="https://fonts.googleapis.com/css2?family=Cinzel+Decorative:wght@700&family=Crimson+Pro:ital,wght@0,300;0,400;1,300&display=swap" rel="stylesheet"/>
<link rel="stylesheet" href="style.css"/>
</head>
<body>
<div class="orb"></div>
<div class="stars" id="stars"></div>
<div class="card">
<div class="header">
<div class="title">Mini Akinator</div>
<div class="subtitle">Pense em um animal</div>
</div>
<div class="progress-wrap">
<div class="progress-bar"><div class="progress-fill" id="progress" style="width:0%"></div></div>
<div class="progress-label" id="step-label">11 candidatos</div>
</div>
<div class="question-area">
<div class="question-text" id="question">Pronto para começar?</div>
</div>
<div class="btn-row" id="game-btns" class="hidden" style="display:none">
<button class="btn btn-sim" onclick="answer(true)"><span>✓ Sim</span></button>
<button class="btn btn-nao" onclick="answer(false)"><span>✗ Não</span></button>
</div>
<div class="btn-row" id="start-btns">
<button class="btn btn-sim" onclick="startGame()"><span>Começar</span></button>
</div>
<div id="result-area" class="result hidden">
<span class="result-icon">🔮</span>
<div class="result-label">Minha resposta é</div>
<div class="result-answer" id="result-text"></div>
<div class="btn-row" style="margin-top:1.4rem">
    <button class="btn btn-restart" onclick="restartGame()"><span>↺ Jogar novamente</span></button>
    </div>
</div>
<div class="trail hidden" id="trail">
    <div class="trail-title">Caminho percorrido</div>
    <div class="trail-items" id="trail-items"></div>
</div>
</div>
<script src="script.js"></script>
</body>
</html>
